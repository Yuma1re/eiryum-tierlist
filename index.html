<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Legends Tier List</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

</div>

<div id="tierlist"></div>

</div>

<script src="js/main.js"></script>

</html>
